name: Build and Push

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: qwui-go
            dockerfile: Dockerfile.go
            platform: linux/amd64
            runner: ubuntu-latest
          - image: qwui-go
            dockerfile: Dockerfile.go
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: qwui-rust
            dockerfile: Dockerfile.rust
            platform: linux/amd64
            runner: ubuntu-latest
          - image: qwui-rust
            dockerfile: Dockerfile.rust
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image: [qwui-go, qwui-rust]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@sha256:%s ' *)

  cleanup:
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      packages: write

    strategy:
      matrix:
        image: [qwui-go, qwui-rust]

    steps:
      - name: Delete untagged images
        run: |
          OWNER="${{ github.repository_owner }}"
          PACKAGE="${{ matrix.image }}"

          # Get all package versions
          VERSIONS=$(gh api "/users/${OWNER}/packages/container/${PACKAGE}/versions" --paginate 2>/dev/null || gh api "/orgs/${OWNER}/packages/container/${PACKAGE}/versions" --paginate 2>/dev/null || echo '[]')

          # Find untagged versions (where tags array is empty)
          UNTAGGED=$(echo "$VERSIONS" | jq -r '.[]? | select((.metadata.container.tags // []) | length == 0) | .id')

          if [ -z "$UNTAGGED" ]; then
            echo "No untagged images found for ${PACKAGE}"
          else
            echo "Found untagged versions for ${PACKAGE}:"
            echo "$UNTAGGED" | while read -r VERSION_ID; do
              echo "Deleting version: ${VERSION_ID}"
              gh api --method DELETE "/users/${OWNER}/packages/container/${PACKAGE}/versions/${VERSION_ID}" --silent 2>/dev/null || \
              gh api --method DELETE "/orgs/${OWNER}/packages/container/${PACKAGE}/versions/${VERSION_ID}" --silent 2>/dev/null || \
              echo "Failed to delete ${VERSION_ID}"
            done
            echo "Cleanup complete"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-chart:
    runs-on: ubuntu-latest
    needs: cleanup
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update Chart.yaml from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: $VERSION/" helm/qwui/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" helm/qwui/Chart.yaml

      - name: Commit and push
        run: |
          if git diff --quiet helm/qwui/Chart.yaml; then
            echo "No changes to Chart.yaml"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add helm/qwui/Chart.yaml
            git commit -m "chore: update Chart.yaml to ${{ github.ref_name }}"
            git push
          fi
