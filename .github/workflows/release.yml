name: Build and Push

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: qwui-go
            dockerfile: Dockerfile.go
            platform: linux/amd64
            runner: ubuntu-latest
          - image: qwui-go
            dockerfile: Dockerfile.go
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: qwui-rust
            dockerfile: Dockerfile.rust
            platform: linux/amd64
            runner: ubuntu-latest
          - image: qwui-rust
            dockerfile: Dockerfile.rust
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image: [qwui-go, qwui-rust]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@sha256:%s ' *)

  helm-release:
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update chart version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: \"$VERSION\"/" helm/qwui/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" helm/qwui/Chart.yaml

      - name: Release chart
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: helm
          skip_existing: false

  cleanup:
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      packages: write

    strategy:
      matrix:
        image: [qwui-go, qwui-rust]

    steps:
      - name: Delete untagged images
        run: |
          # Install crane if not available
          if ! command -v crane &> /dev/null; then
            go install github.com/google/go-containerregistry/cmd/crane@latest
            export PATH=$PATH:$(go env GOPATH)/bin
          fi

          # Login to GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

          # Get all digests for this image
          DIGESTS=$(crane ls ghcr.io/${{ github.repository_owner }}/${{ matrix.image }} --filter='^sha256:' 2>/dev/null || true)

          # Delete each untagged image (digests without tags)
          if [ -n "$DIGESTS" ]; then
            echo "Found untagged images, deleting..."
            for digest in $DIGESTS; do
              echo "Deleting: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@$digest"
              crane delete "ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@$digest" 2>/dev/null || echo "Failed to delete $digest, might already be deleted"
            done
            echo "Cleanup complete"
          else
            echo "No untagged images found"
          fi
        env:
          REGISTRY: ghcr.io
